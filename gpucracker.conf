#==============================================================================
# SCAN MODE SETTINGS
#==============================================================================

# Vanity pattern to search for
# vanity = 1BTC

# Pattern with wildcards
# pattern = 1A*Z

# Case insensitive matching
case_insensitive = false

# Address type: p2pkh, p2sh, bech32, taproot, all
address_type = all

# Count limit (0 = unlimited)
