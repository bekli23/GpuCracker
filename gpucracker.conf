# GpuCracker v50.0 Configuration File
# https://github.com/bekli23/GpuCracker
# 
# This is the main configuration file for GpuCracker.
# Copy to ~/.config/GpuCracker/gpucracker.conf (Linux) or %APPDATA%\GpuCracker\gpucracker.conf (Windows)
# Or specify with: ./GpuCracker --config /path/to/gpucracker.conf

#==============================================================================
# GENERAL SETTINGS
#==============================================================================

# Mode selection (required if not specified on command line)
# Options: mnemonic, akm, check, scan, xprv, brainwallet, pubkey, bsgs, rho, hybrid
mode = mnemonic

# Enable verbose output
verbose = false

# Enable debug mode (extra logging)
debug = false

# Silent mode (only errors and results)
silent = false

# Output file for results
# output = results.txt

# Output format: text, json, csv, xml
output_format = text

# Pretty print JSON output
pretty_print = false

# Number of CPU threads (0 = auto-detect)
threads = 0

# CPU affinity (e.g., "0-15" or "0,2,4,6")
# cpu_affinity = 

# Real-time priority (Linux only, requires root)
realtime_priority = false

# Secure memory (lock pages, prevent swapping)
secure_memory = false

# Clear sensitive data on exit
secure_exit = true

#==============================================================================
# GPU SETTINGS
#==============================================================================

# Enable GPU acceleration
gpu = true

# GPU type: cuda, opencl, auto
gpu_type = auto

# GPU device IDs (comma-separated, e.g., "0,1,2,3")
# gpu_devices = 0

# GPU memory limit in MB (0 = unlimited)
gpu_memory_limit = 0

# CUDA-specific settings
cuda_blocks = 256
cuda_threads = 256

# OpenCL-specific settings
opencl_workgroup_size = 128

# Enable GPU auto-tuning
auto_tune = true

# Auto-tune duration in seconds
tune_duration = 60

# Thermal limit in Celsius (0 = disabled)
thermal_limit = 85

# Power limit in Watts (0 = disabled)
# power_limit = 300

#==============================================================================
# BLOOM FILTER SETTINGS
#==============================================================================

# Bloom filter file(s) for address checking (comma-separated)
# bloom_keys = /path/to/addresses.blf

# Multiple bloom filters
# bloom_keys = /path/to/btc_2010.blf,/path/to/btc_2011.blf,/path/to/btc_2012.blf

# False positive probability (default: 0.001 = 0.1%)
bloom_fpp = 0.001

# Bloom filter size in bits (auto-calculated if not specified)
# bloom_size = 1000000000

# Number of hash functions (auto-calculated if not specified)
# bloom_hashes = 10

#==============================================================================
# MNEMONIC MODE SETTINGS
#==============================================================================

# Number of words: 12, 15, 18, 21, 24
words = 12

# Language: english, chinese_simplified, chinese_traditional, french, italian, japanese, korean, spanish, czech
language = english

# Multiple languages (comma-separated)
# languages = english,spanish,french

# Word order: random, sequential, schematic
order = random

# Schematic pattern file
# akm_file = /path/to/schematic.txt

# Brute force pattern (e.g., "?????" for last 5 words)
# brute_pattern = 

# Prefix words (fixed at start)
# prefix = abandon abandon abandon

# Suffix words (fixed at end)
# suffix = 

# Infinite mode (run until stopped)
infinite = false

# Maximum count to generate
# count = 1000000

# Entropy mode: default, hex, bin, dice, random
entropy_mode = default

# Continue from specific offset
# continue = 0x1000

# Path file for derivation
# path_file = paths_bitcoin_standard.txt

# Multi-coin support (comma-separated)
# multi_coin = BTC,ETH,LTC

# All supported coins
# multi_coin = ALL

#==============================================================================
# AKM MODE SETTINGS
#==============================================================================

# AKM profile file
# akm_profile = profile_v500.json

# AKM mode: scan, analyze, predict
akm_mode = scan

# Start key (hex)
# start = 0x00000000000000000000000000000001

# End key (hex)
# end = 0xffffffffffffffffffffffffffffffff

# Range in bits (e.g., 80 for 2^80)
# range = 80

# Partition number for distributed search
# partition = 0

# Total partitions
# total_partitions = 1

# Hex pattern with wildcards (*)
# pattern = 1a*3b*5c*7d*

# Pattern file with multiple patterns
# pattern_file = patterns.txt

# Adaptive range scanning
adaptive_range = false

# Maximum adaptive range
# max_range = 128

#==============================================================================
# BSGS MODE SETTINGS (Baby-Step Giant-Step)
#==============================================================================

# Target public key (hex, compressed or uncompressed)
# bsgs_pub = 0279BE667EF9DCBBAC55A06295CE870B07029BFCDB2DCE28D959F2815B16F81798

# Search range in bits (e.g., 60 for 2^60)
# bsgs_range = 60

# Baby steps table size (m value, auto-calculated if not specified)
# bsgs_m = 1073741824

# Start offset for resuming
# bsgs_start = 0

# Maximum key value
# bsgs_max = 0

# Number of threads for baby steps
# bsgs_threads = 0

# Search mode: sequential, random
bsgs_mode = sequential

# Segment bits for random mode (e.g., 20 for 2^20 segments)
# bsgs_segment_bits = 20

# Cache file for baby steps
# bsgs_cache = bsgs_baby_steps_m1073741824.cache

# Multi-target file (one public key per line)
# bsgs_targets = targets.txt

# Use Bloom filter for baby steps (10x less memory)
bsgs_bloom = false

# Bloom filter file for address checking
# bsgs_bloom_keys = btc_addresses.blf

# Enable GPU acceleration for giant steps
bsgs_use_gpu = true

# Distributed node ID (0 to total_nodes-1)
# bsgs_node_id = 0

# Total nodes in cluster
# bsgs_total_nodes = 1

#==============================================================================
# RHO MODE SETTINGS (Pollard's Rho)
#==============================================================================

# Target public key
# rho_pub = 0279BE667EF9DCBBAC55A06295CE870B07029BFCDB2DCE28D959F2815B16F81798

# Search range in bits
# rho_range = 90

# Number of parallel Rho instances
rho_instances = 64

# Distinguished point threshold in bits (e.g., 24 means 1 in 2^24)
rho_distinguished_bits = 24

# State file for resume
# rho_state = rho_state.bin

# Random seed for reproducibility
# rho_seed = 12345

# Enable GPU acceleration
rho_use_gpu = true

# Maximum iterations (0 = unlimited)
# rho_max_iterations = 0

# Time limit in seconds (0 = unlimited)
# rho_time_limit = 86400

# Multi-target file
# rho_targets = targets.txt

#==============================================================================
# HYBRID MODE SETTINGS
#==============================================================================

# Target public key
# target_pub = 

# Search range in bits
# search_range = 70

# Prefer BSGS when possible
prefer_bsgs = true

# Prefer Rho for large ranges
# prefer_rho = false

# Enable dynamic algorithm switching
dynamic_switch = true

# Memory limit in GB (0 = unlimited)
# memory_limit = 0

# Bloom threshold in bits (switch to bloom BSGS above this)
# bloom_threshold = 64

# BSGS timeout in seconds (switch to Rho after timeout)
# bsgs_timeout = 3600

# Switch to Rho on out-of-memory
oom_switch_to_rho = true

#==============================================================================
# CHECK MODE SETTINGS
#==============================================================================

# Key to check (WIF or hex)
# key = 

# Public key to check
# pubkey = 

# Address to check
# address = 

# Mnemonic to validate
