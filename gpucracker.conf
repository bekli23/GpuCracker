# Random scan
random_scan = false

# Start offset
# start = 0

# Time limit in seconds
# time_limit = 0

# Checkpoint file for resume
# checkpoint = scan.chk

# Resume from checkpoint
# resume = false

# Show generation rate
show_rate = true

# Estimate time for completion
estimate_time = true

#==============================================================================
# XPRV MODE SETTINGS
#==============================================================================

# XPRV key
